# nginx.conf — VM Intranet reverse proxy for Joy LMS
# Place at /etc/nginx/sites-available/joy_lms
# Symlink: ln -s /etc/nginx/sites-available/joy_lms /etc/nginx/sites-enabled/

upstream joy_lms_gunicorn {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name lms.yourintranet.local;

    # Redirect HTTP → HTTPS (if SSL configured)
    # return 301 https://$host$request_uri;

    client_max_body_size 200M;

    # Static files (served directly by Nginx)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Media/uploaded files
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Django application
    location / {
        proxy_pass http://joy_lms_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
    }
}

